<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sachin's public notebook — notes, tutorials, and references.">
  <title>Sachin's Public Notebook</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: "Sachin's Notebook",
      repo: 'https://github.com/indulge/sachin-notebook',
      loadSidebar: true,
      subMaxLevel: 2,
      homepage: 'README.md',

        placeholder: 'Search',

        depth: 3

      alias: {
        '/.claude/(.*)': '_404.md'

      notFoundPage: '_404.md'
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
